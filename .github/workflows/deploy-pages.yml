name: Deploy Astro site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and build site
        run: npm run verify

      - name: Add deployment revision
        run: printf '%s\n' "${GITHUB_SHA}" > dist/deployment.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify published revision
        env:
          CUSTOM_DOMAIN: https://datadojo.dev
          EXPECTED_SHA: ${{ github.sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          for attempt in {1..12}; do
            cache_buster="deployment=${EXPECTED_SHA}-${attempt}"
            pages_revision="$(curl --fail --silent --show-error "${PAGE_URL%/}/deployment.txt?${cache_buster}" || true)"
            custom_revision="$(curl --fail --silent --show-error "${CUSTOM_DOMAIN%/}/deployment.txt?${cache_buster}" || true)"

            if [[ "${pages_revision}" == "${EXPECTED_SHA}" && "${custom_revision}" == "${EXPECTED_SHA}" ]]; then
              echo "Published ${EXPECTED_SHA} to ${CUSTOM_DOMAIN}."
              exit 0
            fi

            echo "Deployment is not visible yet (attempt ${attempt}/12)."
            sleep 10
          done

          echo "Expected ${EXPECTED_SHA} at both ${PAGE_URL} and ${CUSTOM_DOMAIN}." >&2
          exit 1
