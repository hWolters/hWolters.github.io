name: Publish Hugo site

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-pages.yml
      - config.toml
      - content/**
      - layouts/**
      - scripts/build-site.sh
      - static/**
      - themes/**
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: publish-site
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.87.0
  HUGO_ARCHIVE_SHA256: f216af92c06809c03981296f513ce54d3d690715d3c9fdfaff802d4a6759a260

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Install Hugo
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/hugo.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz"
          echo "${HUGO_ARCHIVE_SHA256}  ${archive}" | sha256sum --check -
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" hugo
          "${RUNNER_TEMP}/hugo" version

      - name: Build site
        env:
          HUGO_BIN: ${{ runner.temp }}/hugo
        run: scripts/build-site.sh

      - name: Publish generated output
        shell: bash
        run: |
          rsync --archive public/ ./
          git add --all

          if git diff --cached --quiet; then
            echo "Generated output is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --message "Publish site for ${GITHUB_SHA}"
          git push origin HEAD:master

      - name: Request GitHub Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
