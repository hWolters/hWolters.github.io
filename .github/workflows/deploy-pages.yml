name: Deploy Astro site to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-pages.yml
      - astro.config.mjs
      - migration/**
      - package.json
      - package-lock.json
      - public/**
      - scripts/**
      - src/**
      - tsconfig.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install, verify, build, and upload site
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: npm@11
          build-cmd: npm run verify

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
