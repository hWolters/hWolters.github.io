  url = "https://github.com/hWolters"

[params]
    description = "Random Topics around Data Science an Data Engineering. I share what I learned along the way."
    sidebarBehavior = 1
    coverImage = "source/assets/img/banner"
    syntaxHighlighter = "highlight.js"
    swapPaginator = false
    
    # options for highlight.js (version, additional languages, and theme)
    highlightjsVersion = "9.12.0"
    highlightjsCDN = "//cdnjs.cloudflare.com/ajax/libs"
    highlightjsLang = ["r", "yaml"]
    highlightjsTheme = "github"
    dateFormat = "2 January 2006"

    MathJaxCDN = "//cdnjs.cloudflare.com/ajax/libs"
    MathJaxVersion = "2.7.5"


    keywords = ["SQL", "Data Science", "Analytics", "ElasticSearch", "Python", "Pandas", "R Markdown", "Research", "phd", "Text Mining", "Natural Language Processing", "Hive", "Data Analysis", "Data Mining"]

# Seo
enableRobotsTXT = true
canonifyURLs = true


[params.header.rightLink]
  class = "open-algolia-search"
  icon = "search"
  url = "/#search"

[[params.sharingOptions]]
    name = "Facebook"
    icon = "fa-facebook-official"
    url = "https://www.facebook.com/sharer/sharer.php?u=%s"

[[params.sharingOptions]]
    name = "Twitter"
    icon = "fa-twitter"
    url = "https://twitter.com/intent/tweet?text=%s"
